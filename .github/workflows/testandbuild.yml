name: TestAndBuild

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [update-integration]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    name: Static checks (detekt + lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run detekt
        run: ./gradlew detekt --no-daemon

      - name: Run Android lint
        run: ./gradlew lintDebug --no-daemon

      - name: Upload static-analysis reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: static-analysis-reports
          path: |
            app/build/reports/detekt/
            app/build/reports/lint-results-*.html
            app/build/reports/lint-results-*.xml
          if-no-files-found: ignore

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-reports
          path: |
            app/build/reports/tests/
            app/build/test-results/
          if-no-files-found: ignore

  build-apk:
    name: Build debug APK
    needs:
      - static-checks
      - unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: mandacaru-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

# The instrumented (androidTest) suite is not run in CI: the app ships
# arm64-v8a-only native libs, so its APK only installs on an arm64 emulator,
# and no GitHub-hosted runner can run an accelerated arm64 emulator (Linux
# arm64 has no /dev/kvm; macOS Apple Silicon reports HVF HV_UNSUPPORTED;
# x86_64 runners can't install the arm64-only APK). Run them on a device:
#   ./gradlew connectedDebugAndroidTest
