# Detekt configuration for Mandacaru
# Builds upon the default config (buildUponDefaultConfig = true)

naming:
  FunctionNaming:
    ignoreAnnotated:
      - 'Composable'
  TopLevelPropertyNaming:
    constantPattern: '[A-Z][A-Za-z0-9_]*'

complexity:
  LongParameterList:
    # ViewModels are constructor-injected by Koin; a handful of collaborators is
    # normal DI, not a design smell. Keep the function limit at the default.
    constructorThreshold: 8
    ignoreAnnotated:
      - 'Composable'
  LongMethod:
    ignoreAnnotated:
      - 'Composable'
  TooManyFunctions:
    thresholdInFiles: 30
    thresholdInClasses: 30
    thresholdInObjects: 25
    thresholdInInterfaces: 20
  CyclomaticComplexMethod:
    threshold: 20
    ignoreAnnotated:
      - 'Composable'

Compose:
  ParameterNaming:
    active: false

style:
  ReturnCount:
    max: 7
  MagicNumber:
    ignorePropertyDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreAnnotated:
      - 'Composable'
      - 'Preview'
      - 'PreviewLightDark'
    excludes:
      - '**/SnapshotCodec.kt'
      - '**/PeerAddressValidator.kt'
      - '**/HeaderSyncProgress.kt'
  UnusedPrivateMember:
    ignoreAnnotated:
      - 'Preview'
      - 'PreviewLightDark'
  MaxLineLength:
    maxLineLength: 150
    excludes:
      - '**/test/**'
      - '**/androidTest/**'
      - '**/Constants.kt'
      - '**/UtreexoExportQrSheet.kt'
