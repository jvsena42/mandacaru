# Detekt configuration for Mandacaru
# Builds upon the default config (buildUponDefaultConfig = true)

naming:
  FunctionNaming:
    ignoreAnnotated:
      - 'Composable'
  TopLevelPropertyNaming:
    constantPattern: '[A-Z][A-Za-z0-9_]*'

complexity:
  LongParameterList:
    ignoreAnnotated:
      - 'Composable'
  LongMethod:
    ignoreAnnotated:
      - 'Composable'
  TooManyFunctions:
    thresholdInFiles: 20
    thresholdInClasses: 25
    thresholdInInterfaces: 20
  CyclomaticComplexMethod:
    threshold: 20

style:
  MagicNumber:
    ignorePropertyDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreAnnotated:
      - 'Composable'
      - 'Preview'
      - 'PreviewLightDark'
  UnusedPrivateMember:
    ignoreAnnotated:
      - 'Preview'
      - 'PreviewLightDark'
  MaxLineLength:
    maxLineLength: 150
    excludes:
      - '**/test/**'
      - '**/androidTest/**'
